<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Auth Page</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #6b4226, #a47148);
}

.container {
  width: 350px;
  background: white;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.header {
  display: flex;
}

.header div {
  flex: 1;
  text-align: center;
  padding: 15px;
  cursor: pointer;
  font-weight: bold;
  background: #eee;
}

.header .active {
  background: #6b4226;
  color: white;
}

.form {
  padding: 25px;
  display: none;
}

.form.active {
  display: block;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  background: #6b4226;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 10px;
}

button:hover {
  background: #4b2e1a;
}

#msg {
  text-align: center;
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div id="loginTab" class="active" onclick="showForm('login')">Login</div>
    <div id="registerTab" onclick="showForm('register')">Register</div>
  </div>

  <!-- LOGIN -->
  <div id="loginForm" class="form active">
    <h2 style="text-align:center;">Welcome Back</h2>
    <form onsubmit="loginUser(event)">
      <input type="email" id="loginEmail" placeholder="Email" required>
      <input type="password" id="loginPassword" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>
  </div>

  <!-- REGISTER -->
  <div id="registerForm" class="form">
    <h2 style="text-align:center;">Create Account</h2>
    <form onsubmit="registerUser(event)">
      <input type="text" id="regName" placeholder="Full Name" required>
      <input type="email" id="regEmail" placeholder="Email" required>
      <input type="password" id="regPassword" placeholder="Password" required>
      <button type="submit">Register</button>
    </form>
  </div>

  <p id="msg"></p>

</div>

<script>
let users = [];

function showForm(type) {
  document.getElementById("loginForm").classList.remove("active");
  document.getElementById("registerForm").classList.remove("active");
  document.getElementById("loginTab").classList.remove("active");
  document.getElementById("registerTab").classList.remove("active");

  if(type === "login") {
    document.getElementById("loginForm").classList.add("active");
    document.getElementById("loginTab").classList.add("active");
  } else {
    document.getElementById("registerForm").classList.add("active");
    document.getElementById("registerTab").classList.add("active");
  }

  document.getElementById("msg").innerHTML = "";
}

function registerUser(e) {
  e.preventDefault();

  const name = document.getElementById("regName").value;
  const email = document.getElementById("regEmail").value;
  const password = document.getElementById("regPassword").value;

  users.push({name, email, password});

  document.getElementById("msg").style.color = "green";
  document.getElementById("msg").innerHTML = "✅ Registered Successfully";

  document.getElementById("registerForm").reset();
}

function loginUser(e) {
  e.preventDefault();

  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPassword").value;

  const user = users.find(u => u.email === email && u.password === password);

  if(user) {
    document.getElementById("msg").style.color = "green";
    document.getElementById("msg").innerHTML = "✅ Login Successful";
  } else {
    document.getElementById("msg").style.color = "red";
    document.getElementById("msg").innerHTML = "❌ Invalid Credentials";
  }
}
</script>

</body>
</html>
